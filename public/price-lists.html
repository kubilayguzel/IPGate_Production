<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>IPGate - Ücret Tarifeleri</title>
    <meta name="viewport" content="width=device-width, initial-scale=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/shared-styles.css">
    <link rel="stylesheet" href="css/simple-loading.css">
</head>
<body class="bg-light">
    <div id="shared-layout-container"></div>

    <template id="page-content-template">
        <div class="container-fluid px-4 py-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="h3 mb-0 text-gray-800 font-weight-bold">Finansal Ücret Tarifeleri</h1>
                    <p class="text-muted small mb-0">Müvekkillere ve gruplara özel tarife fiyat listelerinin yönetimi</p>
                </div>
                <div>
                    <button id="btnCreatePriceList" class="btn btn-primary shadow-sm font-weight-bold">
                        <i class="fas fa-plus-circle mr-2"></i> Yeni Tarife Şablonu Oluştur
                    </button>
                </div>
            </div>

            <ul class="nav nav-tabs mb-3 border-bottom-0" id="priceListsTabs" role="tablist">
                <li class="nav-item">
                    <a class="nav-link active font-weight-bold" data-toggle="tab" href="#content-tariffs" style="border-radius: 8px 8px 0 0;">
                        <i class="fas fa-list-alt mr-2"></i> Tarife Şablonları
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link font-weight-bold text-secondary" data-toggle="tab" href="#content-assignments" style="border-radius: 8px 8px 0 0;">
                        <i class="fas fa-user-check mr-2"></i> Müvekkil Atamaları
                    </a>
                </li>
            </ul>

            <div class="tab-content card shadow-sm border-0 bg-white rounded-lg" style="border-top-left-radius: 0 !important;">
                <div class="tab-pane fade show active p-0" id="content-tariffs">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-secondary">
                                <tr>
                                    <th style="width: 5%" class="border-top-0 border-bottom">#</th>
                                    <th style="width: 25%" class="border-top-0 border-bottom">Tarife Adı</th>
                                    <th style="width: 40%" class="border-top-0 border-bottom">Açıklama</th>
                                    <th style="width: 15%" class="text-center border-top-0 border-bottom">Kalem Sayısı</th>
                                    <th style="width: 15%" class="text-center border-top-0 border-bottom">İşlemler</th>
                                </tr>
                            </thead>
                            <tbody id="priceListsTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="tab-pane fade p-0" id="content-assignments">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="bg-light text-secondary">
                                <tr>
                                    <th class="border-top-0 border-bottom">Müvekkil / Cari Adı</th>
                                    <th class="border-top-0 border-bottom">Mevcut Atanmış Tarife</th>
                                    <th class="text-center border-top-0 border-bottom" style="width: 25%">Tarife Değiştir / Ata</th>
                                </tr>
                            </thead>
                            <tbody id="assignmentsTableBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <div class="modal fade" id="priceListModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 12px;">
                <div class="modal-header bg-light border-bottom-0 py-3">
                    <h5 class="modal-title font-weight-bold text-dark"><i class="fas fa-tags text-primary mr-2"></i> Yeni Tarife Şablonu</h5>
                    <button type="button" class="close text-secondary close-modal-btn" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body pt-2 pb-4">
                    <form id="priceListForm">
                        <div class="form-group">
                            <label class="font-weight-bold text-dark small">Tarife Adı <span class="text-danger">*</span></label>
                            <input type="text" id="plName" class="form-control bg-light border-0" placeholder="Örn: VIP Müvekkil Tarifesi" required>
                        </div>
                        <div class="form-group mb-0">
                            <label class="font-weight-bold text-dark small">Açıklama</label>
                            <textarea id="plDescription" class="form-control bg-light border-0" rows="3" placeholder="Bu tarifenin kullanım detayları..."></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 bg-white" style="border-radius: 0 0 12px 12px;">
                    <button type="button" class="btn btn-light text-secondary font-weight-bold close-modal-btn px-4" data-dismiss="modal">İptal</button>
                    <button type="button" id="btnSavePriceList" class="btn btn-primary font-weight-bold px-4 shadow-sm">Oluştur</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="tariffItemsModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog modal-xl modal-dialog-centered" role="document">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 12px; overflow: hidden;">
                <div class="modal-header bg-dark text-white py-3 border-0">
                    <h5 class="modal-title font-weight-bold" id="tariffModalTitle">Tarife Kalemleri</h5>
                    <button type="button" class="close text-white close-modal-btn" data-dismiss="modal" style="opacity: 0.8;">&times;</button>
                </div>
                <div class="modal-body p-0 bg-light">
                    <div class="row no-gutters">
                        <div class="col-md-4 p-4 border-right bg-white">
                            <h6 class="font-weight-bold text-primary mb-4"><i class="fas fa-plus-circle mr-2"></i>Yeni Fiyat Ekle</h6>
                            <input type="hidden" id="currentPriceListId">
                            
                            <div class="form-group">
                                <label class="font-weight-bold small text-dark">Katalog Seçimi</label>
                                <select id="itemFeeId" class="form-control bg-light border-0">
                                    <option value="">-- Katalog Dışı (Özel İsim Belirle) --</option>
                                </select>
                                <small class="text-muted mt-1 d-block" style="font-size: 0.75rem;">Standart hizmet kataloğundaki bir fiyatı ezmek için seçin.</small>
                            </div>
                            
                            <div class="form-group" id="customNameContainer">
                                <label class="font-weight-bold small text-dark">Özel Kalem/Hizmet Adı <span class="text-danger">*</span></label>
                                <input type="text" id="itemCustomName" class="form-control bg-light border-0" placeholder="Örn: Özel Yıllık Danışmanlık">
                            </div>
                            
                            <div class="form-group">
                                <label class="font-weight-bold small text-dark">Hizmet Türü</label>
                                <select id="itemFeeType" class="form-control bg-light border-0">
                                    <option value="Hizmet">Evreka Hizmet Bedeli</option>
                                    <option value="Harç">TÜRKPATENT Resmi Harç</option>
                                </select>
                            </div>
                            
                            <div class="form-row">
                                <div class="form-group col-md-7">
                                    <label class="font-weight-bold small text-dark">Anlaşılan Fiyat <span class="text-danger">*</span></label>
                                    <input type="number" id="itemAmount" class="form-control bg-light border-0 font-weight-bold text-success" step="0.01" placeholder="0.00" required>
                                </div>
                                <div class="form-group col-md-5">
                                    <label class="font-weight-bold small text-dark">Para Birimi</label>
                                    <select id="itemCurrency" class="form-control bg-light border-0">
                                        <option value="TRY">TRY (₺)</option>
                                        <option value="EUR">EUR (€)</option>
                                        <option value="USD">USD ($)</option>
                                    </select>
                                </div>
                            </div>
                            
                            <button type="button" id="btnAddItemToTemplate" class="btn btn-primary btn-block font-weight-bold mt-3 shadow-sm py-2">
                                <i class="fas fa-check mr-2"></i> Şablona Ekle
                            </button>
                        </div>

                        <div class="col-md-8 p-0 bg-light d-flex flex-column">
                            <div class="p-3 border-bottom bg-white d-flex justify-content-between align-items-center">
                                <h6 class="font-weight-bold text-secondary mb-0"><i class="fas fa-tags mr-2"></i>Bu Şablona Eklenen Özel Fiyatlar</h6>
                            </div>
                            <div class="flex-grow-1" style="max-height: 500px; overflow-y: auto;">
                                <table class="table table-hover align-middle mb-0 bg-white">
                                    <thead class="thead-light sticky-top" style="z-index: 1;">
                                        <tr>
                                            <th class="border-top-0 border-bottom">Hizmet / İşlem Kalemi</th>
                                            <th class="border-top-0 border-bottom">Tür</th>
                                            <th class="text-right border-top-0 border-bottom" style="width: 25%">Özel Fiyat</th>
                                            <th class="text-center border-top-0 border-bottom" style="width: 10%">Sil</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tariffItemsTableBody">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    
    <script type="module" src="js/price-list-management/main.js"></script>
</body>
</html>
