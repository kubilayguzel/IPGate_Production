<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPGate - Bülten Entegrasyon Testi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';</script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: none; margin-bottom: 20px; }
        .log-box { background: #1e1e1e; color: #00ff00; font-family: monospace; height: 300px; overflow-y: auto; padding: 15px; border-radius: 10px; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <h2 class="mb-4 text-primary">🚀 EPATS Bülten Entegrasyon Testi</h2>

    <div class="row">
        <div class="col-md-5">
            <div class="card p-4">
                <h5 class="text-primary">1. Aşama: PDF'i Kuyruğa Al</h5>
                <p class="text-muted small">Bülten PDF'ini yükleyip başvuru numaralarını veritabanına atın.</p>
                <input type="text" id="bulletinNo" class="form-control mb-2" placeholder="Bülten No (Örn: 484)" value="484">
                <input type="file" id="pdfInput" class="form-control mb-3" accept="application/pdf">
                <button id="btnParsePdf" class="btn btn-primary w-100">PDF'i Oku ve Kuyruğa At</button>
            </div>

            <div class="card p-4">
                <h5 class="text-warning">2. Aşama: API'den 10 Veri Çek</h5>
                <p class="text-muted small">Kuyruktaki ilk 10 kaydı EPATS API'den çeker ve db'ye yazar.</p>
                <button id="btnFetchApi" class="btn btn-warning w-100"><b>10 Adet Test İşlemi Başlat</b></button>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-4">
                <h5>Terminal (Canlı İzleme)</h5>
                <div id="logArea" class="log-box">Sistem hazır. Lütfen bir işlem başlatın...<br></div>
            </div>
        </div>
    </div>
</div>

<script>
// ==========================================
    // ⚙️ SUPABASE AYARLARI (BURAYI DOLDURUN)
    // ==========================================
    const SUPABASE_URL = 'https://kadxvkejzctwymzeyrrl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImthZHh2a2VqemN0d3ltemV5cnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNzg0NDgsImV4cCI6MjA4Nzc1NDQ0OH0.PFSzq8hOc14HgYwwF_ZR3v82ZzegKcoN4Vqw2wR2ZP0';

    // 🔥 ÇÖZÜM: Değişken adını supabaseClient olarak değiştirdik (Çakışmayı önlemek için)
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- Log Yazdırma Fonksiyonu ---
    function log(message, type = 'info') {
        const logArea = document.getElementById('logArea');
        const time = new Date().toLocaleTimeString();
        let color = '#00ff00';
        if (type === 'error') color = '#ff4444';
        if (type === 'warning') color = '#ffcc00';
        
        logArea.innerHTML += `<span style="color: #888;">[${time}]</span> <span style="color: ${color};">${message}</span><br>`;
        logArea.scrollTop = logArea.scrollHeight; // Otomatik aşağı kaydır
    }

    // ==========================================
    // 🚀 1. AŞAMA: PDF OKUMA VE KUYRUĞA YAZMA
    // ==========================================
    document.getElementById('btnParsePdf').addEventListener('click', async () => {
        const fileInput = document.getElementById('pdfInput').files[0];
        const bulletinNo = document.getElementById('bulletinNo').value;

        if (!fileInput || !bulletinNo) return alert("Lütfen PDF seçin ve Bülten No girin!");

        log("PDF okunuyor, lütfen bekleyin...", "warning");
        try {
            const arrayBuffer = await fileInput.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                fullText += textContent.items.map(item => item.str).join(" ") + " ";
            }

            // Regex ile sadece Numaraları bul
            const regex = /\b(20\d{2}\/\d{5,6})\b/g;
            const matches = fullText.match(regex) || [];
            const uniqueNumbers = [...new Set(matches)];

            if (uniqueNumbers.length === 0) return log("❌ PDF'te numara bulunamadı!", "error");

            log(`✅ Toplam ${uniqueNumbers.length} adet benzersiz numara bulundu!`, "info");
            log("Veritabanına (Kuyruğa) yazılıyor...", "warning");

            // Test için ilk 500 taneyi atıyoruz
            const testBatch = uniqueNumbers.slice(0, 500);
            const payload = testBatch.map(num => ({
                application_number: num,
                bulletin_no: bulletinNo,
                status: 'pending'
            }));

            // 🔥 supabaseClient kullanıyoruz
            const { error } = await supabaseClient.from('bulletin_fetch_queue').upsert(payload, { onConflict: 'application_number' });
            
            if (error) throw error;
            log(`✅ ${testBatch.length} adet numara başarıyla bulletin_fetch_queue tablosuna eklendi!`, "info");

        } catch (err) {
            log(`❌ Hata: ${err.message}`, "error");
        }
    });


    // ==========================================
    // 🚀 2. AŞAMA: EDGE FUNCTION'I TETİKLEME
    // ==========================================
    document.getElementById('btnFetchApi').addEventListener('click', async () => {
        log("Supabase Sunucusuna (Edge Function) emir veriliyor...", "warning");
        log("EPATS bağlantısı sunucu üzerinden güvenle yapılıyor (CORS yok) 🚀", "info");
        
        try {
            // Yazdığımız sunucu kodunu (fetch-bulletin-test) tetikliyoruz
            const { data, error } = await supabaseClient.functions.invoke('fetch-bulletin-test', {
                method: 'POST'
            });

            if (error) throw error;

            if (data.processed > 0) {
                log(`🎉 Harika! Sunucu işlemi bitirdi. ${data.processed} adet kayıt başarıyla eklendi!`, "info");
                log(`Supabase 'ip_records' ve 'ip_record_trademark_details' tablolarını kontrol edebilirsiniz.`, "info");
            } else {
                log(`⚠️ İşlem bitti ancak kayıt eklenmedi. (Kuyruk boş olabilir veya hata oluşmuş olabilir)`, "warning");
            }

        } catch (err) {
            log(`❌ Edge Function Hatası: ${err.message}`, "error");
        }
    });

</script>
</body>
</html>
