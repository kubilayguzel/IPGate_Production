<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Yenileme - IPGATE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f7f6;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-container img {
            max-width: 150px;
        }
    </style>
</head>
<body>

    <div class="reset-card">
        <div class="logo-container">
            <img src="evreka-logo.png" alt="IPGATE Logo">
        </div>
        <h4 class="text-center mb-4">Yeni Şifre Belirleme</h4>
        
        <div id="alertMessage" class="alert d-none" role="alert"></div>

        <form id="resetPasswordForm">
            <div class="mb-3">
                <label for="newPassword" class="form-label">Yeni Şifre</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="newPassword" required minlength="6" placeholder="En az 6 karakter">
                </div>
            </div>
            <div class="mb-4">
                <label for="confirmPassword" class="form-label">Yeni Şifre (Tekrar)</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="confirmPassword" required minlength="6" placeholder="Şifrenizi tekrar girin">
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                Şifremi Güncelle
            </button>
        </form>
    </div>

<script type="module">
        import { supabase } from './supabase-config.js';

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('resetPasswordForm');
            const alertMessage = document.getElementById('alertMessage');
            const submitBtn = document.getElementById('submitBtn');

            // Ekrana mesaj basma fonksiyonu
            function showMessage(msg, type = 'danger') {
                alertMessage.textContent = msg;
                alertMessage.className = `alert alert-${type}`;
                alertMessage.classList.remove('d-none');
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;

                // 1. Şifreler eşleşiyor mu kontrolü
                if (newPassword !== confirmPassword) {
                    showMessage('Girdiğiniz şifreler birbiriyle eşleşmiyor!');
                    return;
                }

                try {
                    // Butonu kitle ve yükleniyor yap
                    submitBtn.disabled = true;
                    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Güncelleniyor...';
                    alertMessage.classList.add('d-none');

                    // 2. Supabase import edildiği için artık "updateUser" sorunsuz çalışacak!
                    const { data, error } = await supabase.auth.updateUser({
                        password: newPassword
                    });

                    if (error) throw error;

                    // 3. Başarılı!
                    showMessage('Şifreniz başarıyla güncellendi! Giriş sayfasına yönlendiriliyorsunuz...', 'success');
                    
                    // 3 saniye sonra login sayfasına (index.html) yönlendir
                    setTimeout(() => {
                        window.location.href = 'index.html'; 
                    }, 3000);

                } catch (error) {
                    console.error('Şifre güncelleme hatası:', error);
                    showMessage('Şifre güncellenemedi: ' + (error.message || 'Geçersiz veya süresi dolmuş link. Lütfen tekrar deneyin.'));
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Şifremi Güncelle';
                }
            });
        });
    </script>
</body>
</html>
