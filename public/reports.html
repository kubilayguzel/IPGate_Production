<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPGATE - Sistem Raporları</title>
    
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    
    <link rel="stylesheet" href="./css/shared-styles.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #2c3e50; background-color: #f4f7fa; overflow-x: hidden; }
        
        /* Ana tasarım kalıbını sağlayan sınıflar */
        .page-wrapper { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; padding-top: 80px; }
        .main-container { width: 100%; max-width: 1500px; margin: 0 auto; padding: 20px 30px; }
        
        /* Dashboard stili başlık kartı */
        .report-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            background: #fff; 
            padding: 25px 35px; 
            border-radius: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
        }
        .report-title { font-size: 2.2em; font-weight: 800; color: #1a2b4c; margin-bottom: 5px; }
        .report-subtitle { color: #7f8c8d; font-size: 1.1em; }
        
        /* Profesyonel Kart Tasarımları */
        .card { border-radius: 20px !important; border: none !important; box-shadow: 0 4px 20px rgba(0,0,0,0.04) !important; }
        .card-header { border-bottom: 1px solid #f1f2f6 !important; border-top-left-radius: 20px !important; border-top-right-radius: 20px !important; }
        
        /* Tablo Stilleri */
        .table-responsive { border-radius: 12px; overflow: hidden; border: 1px solid #e9ecef; }
        .table thead th { 
            background-color: #f8f9fa; 
            color: #34495e; 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 0.85em; 
            letter-spacing: 0.5px; 
            border-bottom: 1px solid #dee2e6; 
        }
    </style>
</head>
<body>
    <div id="notification-container" class="notification-container"></div>
    <div id="layout-placeholder"></div>

    <div class="page-wrapper">
        <main class="main-container">
            
            <div class="report-header">
                <div>
                    <h1 class="report-title">Sistem Raporları</h1>
                    <p class="report-subtitle">Esnek Raporlama ve Analiz Paneli</p>
                </div>
            </div>

            <div class="card shadow-sm mb-4">
                <div class="card-header py-3 bg-white">
                    <h6 class="m-0 font-weight-bold text-primary">Rapor Kriterleri</h6>
                </div>
                <div class="card-body">
                    <div class="row mb-3">
                        <div class="col-md-5">
                            <label class="font-weight-bold text-dark mb-1">Rapor Türü Seçin:</label>
                            <select id="reportTypeSelector" class="form-control form-control-lg" style="border-radius: 10px; font-size: 1em;">
                                <option value="" disabled selected>Lütfen bir rapor seçin...</option>
                                <option value="opposition_report">Müvekkil İtiraz İşleri Raporu</option>
                                </select>
                        </div>
                    </div>
                    <hr class="my-4" style="border-color: #f1f2f6;">
                    
                    <div id="dynamicFilterArea" class="row align-items-end" style="display: none;">
                        </div>
                </div>
            </div>

            <div class="card shadow-sm mb-4" id="reportResultsCard" style="display: none;">
                <div class="card-header py-3 bg-white d-flex justify-content-between align-items-center">
                    <h6 class="m-0 font-weight-bold text-primary" id="reportResultTitle">Rapor Sonuçları</h6>
                    <div class="d-flex gap-2">
                        <button class="btn btn-success btn-sm font-weight-bold mr-2" id="btnExportExcel" style="border-radius: 8px;">
                            <i class="fas fa-file-excel mr-1"></i> Excel İndir
                        </button>
                        <button class="btn btn-danger btn-sm font-weight-bold" id="btnExportPDF" style="border-radius: 8px;">
                            <i class="fas fa-file-pdf mr-1"></i> PDF İndir
                        </button>
                    </div>
                </div>
                <div class="card-body p-0"> <div class="table-responsive p-3">
                        <table class="table table-hover table-bordered table-striped mb-0" id="dynamicReportTable" width="100%" cellspacing="0">
                            <thead id="dynamicReportThead"></thead>
                            <tbody id="dynamicReportTbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    
    <script type="module">
        import { loadSharedLayout } from './js/layout-loader.js';
        import { waitForAuthUser } from './supabase-config.js';

        document.addEventListener('DOMContentLoaded', async function() {
            // 1. Ortak Layout'u (Sol Menü, Üst Bar) Yükle
            try { await loadSharedLayout(); } 
            catch (error) { console.error("Layout yükleme hatası:", error); }

            // 2. Kullanıcı Oturumunu Kontrol Et
            const user = await waitForAuthUser({ requireAuth: true, redirectTo: 'index.html', graceMs: 500 });
            if (!user) return; 

            // 3. Rapor Kontrolcüsü Modülünü Yükle (Layout ve Auth hazırlandıktan sonra)
            // Bu import işlemi, layout yüklendikten sonra gerçekleşmelidir.
            await import('./js/reports/main.js');
        });
    </script>
</body>
</html>
